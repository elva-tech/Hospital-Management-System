version: '3.8'
services:
  db:
    image: postgres:15
    container_name: clinic_postgres
    restart: always
    environment:
      POSTGRES_USER: clinic_admin
      POSTGRES_PASSWORD: clinic_password
      POSTGRES_DB: clinic_hms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: clinic_backend_v2
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./backend/.wwebjs_auth:/app/.wwebjs_auth
    # In production you'd use migrate deploy, but for demo migrate dev syncs schema and seeds
    command: npm start

  frontend:
    build:
      context: ./frontend
    container_name: clinic_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
